<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Никита & Маргарита</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa;
      color: #222;
      text-align: center;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }
    .date {
      color: #777;
      margin-bottom: 40px;
    }
    .block {
      margin-bottom: 40px;
    }
    iframe {
      width: 100%;
      height: 300px;
      border: none;
      border-radius: 12px;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #222;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Никита & Маргарита</h1>
    <div class="date">[дата]</div>

    <div class="block">
      <p>
        Мы женимся и будем рады разделить этот день с вами.
      </p>
    </div>

    <div class="block">
      <h3>Детали</h3>
      <p>[дата] · [время]</p>
      <p>[локация]</p>
    </div>

    <div class="block">
      <h3>Тайминг</h3>
      <p>Сбор гостей — [время]</p>
      <p>Церемония — [время]</p>
      <p>Праздник — [время]</p>
    </div>

    <div class="block">
      <h3>Локация</h3>
      <iframe src="https://yandex.ru/map-widget/v1/?ll=37.6173%2C55.7558&z=10"></iframe>
    </div>

    <div class="block">
      <h3>Подтвердите участие</h3>
      <p>Пожалуйста, ответьте до [дата]</p>
      <a class="btn" href="ССЫЛКА_НА_GOOGLE_FORM" target="_blank">
        Подтвердить
      </a>
    </div>

  </div>
</body>
</html>
